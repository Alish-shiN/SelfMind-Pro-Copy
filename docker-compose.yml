services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-002686}
      POSTGRES_DB: ${POSTGRES_DB:-selfmind_db}
    ports:
      - "5432:5432"
    volumes:
      - selfmind_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      # Ensure docker-compose DB host overrides any local .env defaults
      POSTGRES_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  selfmind_pg:

